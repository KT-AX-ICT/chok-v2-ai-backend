name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 프로젝트 + dev extra(pytest·pytest-asyncio·aiosqlite) 설치.
      # 테스트는 sqlite in-memory + 더미 OpenAI 키(conftest)라 외부 의존·시크릿 불필요.
      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q
