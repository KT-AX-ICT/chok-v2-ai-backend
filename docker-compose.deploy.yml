# 배포용 — FastAPI 앱만. MySQL은 공유 인스턴스(외부)를 사용한다.
# 사전: chok_ai DB·유저 프로비저닝 완료(docs/db-deploy.md).
# 사용: 필수 env(OPENAI_API_KEY·MYSQL_*)를 .env 또는 배포 시크릿으로 주입 후
#   docker compose -f docker-compose.deploy.yml up -d --build
services:
  app:
    build: .
    environment:
      MYSQL_HOST: ${MYSQL_HOST:?공유 MySQL 호스트 필요}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-chok_ai}
      MYSQL_USER: ${MYSQL_USER:-chok_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?chok_ai 비밀번호 필요}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?fail-fast — 키 필수}
      SPRING_BASE_URL: ${SPRING_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BUNDLE_STORAGE_DIR: ${BUNDLE_STORAGE_DIR:-/app/data/bundles}
    ports:
      - "8000:8000"
    volumes:
      # 번들 원본(logs/metrics/traces) 파일. 컨테이너 파일시스템은 재생성 시 사라지므로,
      # 처리 중이던 job의 원본이 재배포 후에도 남으려면 볼륨이 필요하다.
      - ai-bundles:/app/data/bundles
    restart: unless-stopped
    # 공유 MySQL이 다른 compose의 컨테이너라면 그 네트워크에 붙인다:
    # networks: [shared]

volumes:
  ai-bundles:

# networks:
#   shared:
#     external: true
#     name: <공유 MySQL compose network 이름>
