# CHOK v2 AI Backend — 로컬 개발용 MySQL
# 팀 합의: Docker + MySQL 8.4.9 고정 (2026-07-17) — JSON 타입 지원 필수(시스템 5.6 금지)
#
# 사용법:
#   docker compose up -d       # MySQL 기동 (백그라운드)
#   docker compose logs -f db  # 로그 확인
#   docker compose down        # 중지 (데이터 유지)
#   docker compose down -v     # 중지 + 데이터 볼륨 삭제
#
# 접속값은 .env 로 제어한다(아래 기본값은 .env 미설정 시 폴백).

services:
  db:
    image: mysql:8.4.9   # 패치 버전까지 고정 — 8.4 태그는 조용히 8.4.10+로 올라감
    container_name: chok-mysql
    environment:
      MYSQL_DATABASE: "${MYSQL_DB:-chok_ai}"
      # 앱 전용 유저(최소 권한). 팀 컨벤션 — 앱은 root 대신 이 계정으로 접속.
      MYSQL_USER: "${MYSQL_USER:-chok_ai}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-password}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      TZ: UTC
    # 서버 타임존 UTC 고정 + utf8mb4 (Spring 쪽 DB와 규약 통일)
    command:
      - --default-time-zone=+00:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # 호스트 포트는 .env 의 MYSQL_PORT 를 따른다(기본 3307 — Spring MySQL과 포트 규약 통일).
      # 127.0.0.1 바인딩 = 이 PC에서만 접속. 로컬 설치형 MySQL 이 3307 점유 중이면 충돌하니 먼저 종료할 것.
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
      # 테이블은 앱 기동 시 init_db()가 자동 생성 → 별도 schema.sql 불필요
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  db-data:
