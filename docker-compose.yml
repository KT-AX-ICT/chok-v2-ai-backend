services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-chok_ai}
      MYSQL_USER: ${MYSQL_USER:-chok_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: UTC
    # Spring 쪽 DB와 동일하게 서버 타임존 UTC 고정
    command: --default-time-zone=+00:00
    ports:
      # Spring compose와 동일하게 3307로 노출 — 서버(Spring MySQL, 3307)와 포트 규약 통일.
      # 이 PC에선 FastAPI만 개발하므로 Spring 스택과의 포트 충돌 없음.
      # 127.0.0.1 바인딩 = 이 PC에서만 접속 가능.
      - "127.0.0.1:3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      # 스키마는 Alembic이 관리 — 로컬은 'uv run alembic upgrade head'(또는 DB_AUTO_CREATE=true)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
